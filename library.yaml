default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: gauntlet
      description: The Check-out Gauntlet as a defined exam — fixed steps, preserved specimens, answer key, pass/fail; certifies models for fleet roles
      source: https://github.com/mdc159/herdr-verifier/blob/main/gauntlet/SKILL.md

    - name: herdr
      description: Control Herdr terminal multiplexer for coding agents (panes, tabs, workspaces, agent lifecycle)
      source: https://github.com/ogulcancelik/herdr/blob/master/SKILL.md

    - name: library
      description: The Library itself — private-first distribution of skills, agents, and prompts
      source: https://github.com/mdc159/bibliotec/blob/main/SKILL.md

    - name: orchestration-playbook
      description: Fleet orchestration procedures (worker launch, recipes, routing tiers, verification loop) with lessons register
      source: https://github.com/mdc159/the-fleet/blob/main/playbook/SKILL.md

    - name: planf3
      description: Plans For Fable Five — planning meta-skill producing self-contained HTML plans with build/validate workflows
      source: https://github.com/disler/planf3/blob/main/.claude/skills/planf3/SKILL.md

    - name: hermes-onboarding
      description: Idempotent Hermes profile integration for bibliotec — external skill discovery, fleet bootstrap, validation, and optional Herdr/Pi smoke test
      source: https://github.com/mdc159/bibliotec/blob/main/hermes-onboarding/SKILL.md
      requires: [skill:herdr, skill:orchestration-playbook]

  agents:
    - name: builder
      description: Implementation worker — builds and tests in its assigned project directory, reports via artifact
      source: https://github.com/mdc159/the-fleet/blob/main/agents/builder.md

    - name: scribe
      description: Documentation worker — writes and maintains vault notes and reports in house style; docs lanes only
      source: https://github.com/mdc159/the-fleet/blob/main/agents/scribe.md

    - name: verifier
      description: Read-only verifier persona (no write/edit) that independently re-checks builder turns — IndyDevDan verifier pattern
      source: https://github.com/disler/the-verifier-agent/blob/main/.pi/verifier/agents/verifier.md

    - name: verifier-herdr
      description: Herdr-native read-only verifier persona with corrective feedback routed through named agents
      source: https://github.com/mdc159/herdr-verifier/blob/main/personas/verifier.md

    - name: workhorse
      description: Bulk analysis and research worker — sweeps, reads, and reports via artifact files
      source: https://github.com/mdc159/the-fleet/blob/main/agents/workhorse.md

  prompts:
    - name: fleet-bootstrap
      description: Bootstrap stanza for any agent harness — points at bibliotec, orchestrator role assumption, Done-means, PR discipline
      source: https://github.com/mdc159/bibliotec/blob/main/prompts/fleet-bootstrap.md

    - name: wwidd
      description: What Would IndyDevDan Do — corpus-grounded methodologist persona; every "Dan does X" claim must cite a repo file or be relabeled extrapolation
      source: https://github.com/mdc159/bibliotec/blob/main/prompts/wwidd.md
